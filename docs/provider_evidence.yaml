        claim_scope:
          - response_mode
          - release_policy
          - moderation_timing
          - client_obligations
          - documented_limit_or_bound
        short_excerpt: output streams to user immediately
        paraphrase: Streaming is documented as a faster mode where generated output is released immediately while output guardrails run in parallel.
